<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>纹定乾坤 - 声纹识别系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-cyan: #00f5ff;
            --neon-pink: #ff006e;
            --neon-purple: #b537f2;
            --neon-green: #00ff88;
            --dark-bg: #0a0a0f;
            --panel-bg: rgba(255, 255, 255, 0.03);
            --grid-color: rgba(0, 245, 255, 0.05);
            --border-glow: 0 0 8px rgba(0, 245, 255, 0.3);
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark-bg);
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
        }

        /* 网格背景 */
        .cyber-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 0;
            opacity: 0.6;
        }

        /* 扫描线效果 */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 245, 255, 0.02) 50%);
            background-size: 100% 4px;
            z-index: 999;
            pointer-events: none;
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            max-width: 430px;
            margin: 0 auto;
            padding: 0 16px;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 8px;
        }
        .scroll-area::-webkit-scrollbar { width: 2px; }
        .scroll-area::-webkit-scrollbar-track { background: transparent; }
        .scroll-area::-webkit-scrollbar-thumb { background: rgba(0, 245, 255, 0.15); border-radius: 1px; }

        /* Header */
        .header {
            padding-top: 30px;
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-bottom: 16px;
            filter: drop-shadow(0 0 16px rgba(0, 245, 255, 0.4));
            animation: logo-glow 3s ease-in-out infinite;
        }

        @keyframes logo-glow {
            0%, 100% { filter: drop-shadow(0 0 12px rgba(0, 245, 255, 0.3)); }
            50% { filter: drop-shadow(0 0 24px rgba(0, 245, 255, 0.6)); }
        }

        .brand {
            font-size: 36px;
            letter-spacing: 14px;
            color: var(--neon-cyan);
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-cyan);
            animation: flicker 3s infinite;
        }

        .hero-title {
            font-size: 20px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 4px;
            margin-bottom: 4px;
        }

        .hero-subtitle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
        }

        /* ============ 实时声纹频谱 ============ */
        .spectrum-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 245, 255, 0.15);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }

        .spectrum-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .panel-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--neon-cyan);
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .panel-title::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--neon-cyan);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--neon-cyan);
            animation: dot-pulse 1.5s infinite;
        }

        .panel-status {
            font-size: 11px;
            color: var(--neon-green);
            background: rgba(0, 255, 136, 0.1);
            padding: 2px 10px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .spectrum-canvas {
            width: 100%;
            height: 120px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 245, 255, 0.1);
        }

        .spectrum-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            padding: 0 4px;
        }

        .spectrum-label {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
        }

        /* ============ 播放控制栏 ============ */
        .playback-controls {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 245, 255, 0.15);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
        }

        .playback-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .playback-main {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .playback-secondary {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .icon-btn:hover {
            background: rgba(0, 245, 255, 0.1);
            border-color: rgba(0, 245, 255, 0.3);
            box-shadow: var(--border-glow);
        }

        .icon-btn:active {
            transform: scale(0.95);
        }

        .icon-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .icon-btn.play-pause-btn {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            border: none;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
        }

        .icon-btn.play-pause-btn:hover {
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.5);
            transform: scale(1.05);
        }

        .icon-btn.play-pause-btn.playing {
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.3);
        }

        .icon-btn.play-pause-btn svg {
            width: 22px;
            height: 22px;
        }

        .speed-badge {
            font-size: 11px;
            font-weight: 600;
            color: var(--neon-cyan);
            padding: 4px 10px;
            background: rgba(0, 245, 255, 0.08);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .speed-badge:hover {
            background: rgba(0, 245, 255, 0.15);
            box-shadow: var(--border-glow);
        }

        /* ============ 显示模式切换 ============ */
        .display-modes {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .mode-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            margin-right: 4px;
        }

        .mode-btn {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mode-btn:hover {
            border-color: rgba(0, 245, 255, 0.3);
            color: var(--neon-cyan);
        }

        .mode-btn.active {
            background: rgba(0, 245, 255, 0.1);
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 245, 255, 0.2);
        }

        /* ============ 功能按钮区 ============ */
        .function-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 245, 255, 0.15);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .function-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .func-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 12px 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .func-btn:hover {
            background: rgba(0, 245, 255, 0.06);
            border-color: rgba(0, 245, 255, 0.2);
            box-shadow: var(--border-glow);
            transform: translateY(-1px);
        }

        .func-btn:active {
            transform: translateY(0);
        }

        .func-btn.active {
            background: rgba(0, 245, 255, 0.08);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 12px rgba(0, 245, 255, 0.15);
        }

        .func-btn svg {
            width: 22px;
            height: 22px;
            fill: var(--neon-cyan);
        }

        .func-btn span {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            white-space: nowrap;
        }

        /* ============ SID 功能区 ============ */
        .sid-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(181, 55, 242, 0.2);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .sid-panel .panel-header {
            margin-bottom: 14px;
        }

        .sid-panel .panel-title {
            color: var(--neon-purple);
        }

        .sid-panel .panel-title::before {
            background: var(--neon-purple);
            box-shadow: 0 0 8px var(--neon-purple);
        }

        .sid-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .sid-item {
            padding: 10px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            border: 1px solid rgba(181, 55, 242, 0.1);
        }

        .sid-item-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .sid-item-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--neon-cyan);
        }

        .sid-item-value.confidence-high {
            color: var(--neon-green);
        }

        .sid-item-value.confidence-low {
            color: var(--neon-pink);
        }

        .sid-progress {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }

        .sid-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-green));
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        /* ============ 状态文字 ============ */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            background: rgba(0, 245, 255, 0.03);
            border: 1px solid rgba(0, 245, 255, 0.1);
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--neon-green);
            box-shadow: 0 0 8px var(--neon-green);
            animation: dot-pulse 1.5s infinite;
        }

        .status-dot.idle {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: none;
            animation: none;
        }

        .status-text {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* ============ 底部 CTA ============ */
        .cta-container {
            padding-bottom: 16px;
        }

        /* 底部导航 */
        .bottom-nav {
            display: flex; justify-content: center; gap: 10px;
            padding: 12px 0 env(safe-area-inset-bottom, 12px);
            flex-shrink: 0;
            border-top: 1px solid rgba(0, 245, 255, 0.1);
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(10px);
        }
        .nav-link {
            font-size: 12px; padding: 8px 16px; border-radius: 8px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.5); text-decoration: none; transition: all 0.2s ease;
        }
        .nav-link:hover { border-color: rgba(0, 245, 255, 0.3); color: var(--neon-cyan); }
        .nav-link.current { border-color: var(--neon-cyan); color: var(--neon-cyan); background: rgba(0, 245, 255, 0.08); }

        .cta-button {
            width: 100%;
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            color: #ffffff;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            border: none;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.2);
            transition: all 0.3s ease;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .cta-button:hover {
            box-shadow: 0 0 40px rgba(0, 245, 255, 0.4);
            transform: translateY(-1px);
        }

        /* ============ 浮动粒子 ============ */
        .particle {
            position: fixed;
            width: 2px;
            height: 2px;
            background: var(--neon-cyan);
            border-radius: 50%;
            pointer-events: none;
            animation: float-up 10s infinite linear;
            opacity: 0.5;
        }

        /* ============ 动画 ============ */
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
            52% { opacity: 1; }
            54% { opacity: 0.9; }
        }

        @keyframes dot-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        @keyframes float-up {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }

        @keyframes spectrum-scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* ============ 移动端适配 ============ */
        @media (max-width: 375px) {
            .brand { font-size: 30px; letter-spacing: 10px; }
            .playback-row { gap: 8px; }
            .icon-btn { width: 32px; height: 32px; }
            .icon-btn svg { width: 16px; height: 16px; }
            .icon-btn.play-pause-btn { width: 40px; height: 40px; }
            .icon-btn.play-pause-btn svg { width: 20px; height: 20px; }
        }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="scanline"></div>

    <!-- 浮动粒子 -->
    <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
    <div class="particle" style="left: 30%; animation-delay: 2s;"></div>
    <div class="particle" style="left: 50%; animation-delay: 4s;"></div>
    <div class="particle" style="left: 70%; animation-delay: 6s;"></div>
    <div class="particle" style="left: 90%; animation-delay: 8s;"></div>

    <div class="container">
        <!-- Header -->
        <div class="scroll-area">
        <header class="header">
            <img src="logo.png" alt="纹定乾坤 Logo" class="logo-img">
            <div class="brand">纹定乾坤</div>
            <div class="hero-title">声纹识别系统</div>
            <div class="hero-subtitle">VOICEPRINT AUTHENTICATION</div>
        </header>

        <!-- ============ 实时声纹频谱 ============ -->
        <div class="spectrum-panel">
            <div class="panel-header">
                <div class="panel-title">实时频谱</div>
                <div class="panel-status" id="serverStatus">就绪</div>
            </div>
            <canvas class="spectrum-canvas" id="spectrumCanvas" width="382" height="120"></canvas>
            <div class="spectrum-labels">
                <span class="spectrum-label">0Hz</span>
                <span class="spectrum-label">2kHz</span>
                <span class="spectrum-label">4kHz</span>
                <span class="spectrum-label">6kHz</span>
                <span class="spectrum-label">8kHz</span>
            </div>
        </div>

        <!-- ============ 播放控制栏 ============ -->
        <div class="playback-controls">
            <div class="playback-row">
                <div class="playback-main">
                    <!-- 上一段 -->
                    <button class="icon-btn" id="prevBtn" title="上一段">
                        <svg viewBox="0 0 24 24">
                            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                        </svg>
                    </button>
                    <!-- 播放/暂停 -->
                    <button class="icon-btn play-pause-btn" id="playPauseBtn" title="播放/暂停">
                        <svg id="playIcon" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                        <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;">
                            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                        </svg>
                    </button>
                    <!-- 下一段 -->
                    <button class="icon-btn" id="nextBtn" title="下一段">
                        <svg viewBox="0 0 24 24">
                            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                        </svg>
                    </button>
                    <!-- 倍速 -->
                    <div class="speed-badge" id="speedBtn">1x</div>
                </div>

                <div class="playback-secondary">
                    <!-- 音量 -->
                    <button class="icon-btn" id="volumeBtn" title="静音">
                        <svg viewBox="0 0 24 24">
                            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                        </svg>
                    </button>
                    <!-- 麦克风 -->
                    <button class="icon-btn" id="micBtn" title="麦克风">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
                            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- 显示模式 -->
            <div class="display-modes">
                <span class="mode-label">显示:</span>
                <button class="mode-btn active" id="modeWave">波形</button>
                <button class="mode-btn" id="modeSpectrum">频谱</button>
                <button class="mode-btn" id="modeMFCC">MFCC</button>
                <button class="mode-btn" id="modePitch">基频</button>
            </div>
        </div>

        <!-- ============ SID 功能区 ============ -->
        <div class="sid-panel">
            <div class="panel-header">
                <div class="panel-title">说话人识别 (SID)</div>
                <div class="panel-status" style="color: var(--neon-purple); border-color: rgba(181,55,242,0.3); background: rgba(181,55,242,0.1);" id="sidStatus">待机</div>
            </div>
            <div class="sid-grid">
                <div class="sid-item">
                    <div class="sid-item-label">SAD - 语音活动检测</div>
                    <div class="sid-item-value" id="sadValue">--</div>
                    <div class="sid-progress">
                        <div class="sid-progress-bar" id="sadProgress" style="width: 0%"></div>
                    </div>
                </div>
                <div class="sid-item">
                    <div class="sid-item-label">LID - 置信度</div>
                    <div class="sid-item-value" id="lidValue">--</div>
                    <div class="sid-progress">
                        <div class="sid-progress-bar" id="lidProgress" style="width: 0%"></div>
                    </div>
                </div>
                <div class="sid-item">
                    <div class="sid-item-label">SID - 匹配结果</div>
                    <div class="sid-item-value" id="sidResult">--</div>
                </div>
                <div class="sid-item">
                    <div class="sid-item-label">识别置信度</div>
                    <div class="sid-item-value" id="sidConfidence">--</div>
                    <div class="sid-progress">
                        <div class="sid-progress-bar" id="sidProgressBar" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ============ 功能按钮区 ============ -->
        <div class="function-panel">
            <div class="function-grid">
                <button class="func-btn" id="newLayerBtn">
                    <svg viewBox="0 0 24 24">
                        <path d="M19 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/>
                    </svg>
                    <span>新建层</span>
                </button>
                <button class="func-btn" id="copyLayerBtn">
                    <svg viewBox="0 0 24 24">
                        <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                    </svg>
                    <span>拷贝层</span>
                </button>
                <button class="func-btn" id="editLayerBtn">
                    <svg viewBox="0 0 24 24">
                        <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
                    </svg>
                    <span>编辑空白层</span>
                </button>
                <button class="func-btn" id="rotateLayerBtn">
                    <svg viewBox="0 0 24 24">
                        <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                    </svg>
                    <span>后转层</span>
                </button>
                <button class="func-btn" id="layerAddBtn">
                    <svg viewBox="0 0 24 24">
                        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                    </svg>
                    <span>层 + 层</span>
                </button>
                <button class="func-btn" id="layerSubBtn">
                    <svg viewBox="0 0 24 24">
                        <path d="M19 13H5v-2h14v2z"/>
                    </svg>
                    <span>层 - 层</span>
                </button>
                <button class="func-btn" id="layerMulBtn">
                    <svg viewBox="0 0 24 24">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                    <span>层 x 层</span>
                </button>
                <button class="func-btn" id="layerDivBtn">
                    <svg viewBox="0 0 24 24">
                        <path d="M19 13H5v-2h14v2z"/>
                        <circle cx="12" cy="6" r="2"/>
                        <circle cx="12" cy="18" r="2"/>
                    </svg>
                    <span>层 / 层</span>
                </button>
            </div>
        </div>

        <!-- ============ 状态栏 ============ -->
        <div class="status-bar">
            <div class="status-dot idle" id="statusDot"></div>
            <div class="status-text" id="statusText">等待操作指令</div>
        </div>

        <!-- ============ 主 CTA ============ -->
        <div class="cta-container">
            <button class="cta-button" id="identifyBtn">
                <svg viewBox="0 0 24 24" style="width:18px;height:18px;vertical-align:middle;margin-right:6px;fill:currentColor;">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
                识别说话人
            </button>
        </div>

        </div><!-- end scroll-area -->

        <!-- ============ 底部导航 ============ -->
        <div class="bottom-nav">
            <a href="index.html" class="nav-link current">声纹识别</a>
            <a href="language.html" class="nav-link">适配语种</a>
            <a href="dialect.html" class="nav-link">适配方言</a>
            <a href="model.html" class="nav-link">模型管理</a>
        </div>
    </div>

    <script>
        // ==================== DOM 元素 ====================
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const serverStatus = document.getElementById('serverStatus');
        const sidStatus = document.getElementById('sidStatus');
        const canvas = document.getElementById('spectrumCanvas');
        const ctx = canvas.getContext('2d');

        // ==================== 状态变量 ====================
        let isPlaying = false;
        let isPaused = false;
        let audioData = [];
        let speed = 1;
        let animationId = null;
        let displayMode = 'wave'; // wave / spectrum / mfcc / pitch

        // ==================== 播放/暂停 核心按钮 ====================
        playPauseBtn.addEventListener('click', () => {
            if (!isPlaying) {
                // 开始
                isPlaying = true;
                isPaused = false;
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                playPauseBtn.classList.add('playing');
                statusText.textContent = '录音进行中...';
                statusDot.classList.remove('idle');
                statusText.style.color = 'var(--neon-green)';
                serverStatus.textContent = '录音中';
                serverStatus.style.color = 'var(--neon-green)';
                serverStatus.style.borderColor = 'rgba(0,255,136,0.3)';
                serverStatus.style.background = 'rgba(0,255,136,0.1)';
                startSpectrum();
            } else if (isPaused) {
                // 从暂停恢复
                isPaused = false;
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                statusText.textContent = '录音继续中...';
                statusDot.classList.remove('idle');
                statusText.style.color = 'var(--neon-green)';
                serverStatus.textContent = '录音中';
            } else {
                // 暂停
                isPaused = true;
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                playPauseBtn.classList.remove('playing');
                statusText.textContent = '录音已暂停';
                statusDot.classList.add('idle');
                statusText.style.color = 'var(--neon-pink)';
                serverStatus.textContent = '已暂停';
                serverStatus.style.color = 'var(--neon-pink)';
                serverStatus.style.borderColor = 'rgba(255,0,110,0.3)';
                serverStatus.style.background = 'rgba(255,0,110,0.1)';
            }
        });

        // ==================== 倍速切换 ====================
        const speedBtn = document.getElementById('speedBtn');
        speedBtn.addEventListener('click', () => {
            const speeds = [0.5, 1, 1.5, 2];
            const idx = speeds.indexOf(speed);
            speed = speeds[(idx + 1) % speeds.length];
            speedBtn.textContent = speed + 'x';
            statusText.textContent = `播放速度: ${speed}x`;
            setTimeout(() => {
                if (isPlaying && !isPaused) statusText.textContent = '录音进行中...';
                else if (isPlaying) statusText.textContent = '录音已暂停';
                else statusText.textContent = '等待操作指令';
            }, 1500);
        });

        // ==================== 显示模式切换 ====================
        document.getElementById('modeWave').addEventListener('click', function() { setDisplayMode('wave', this); });
        document.getElementById('modeSpectrum').addEventListener('click', function() { setDisplayMode('spectrum', this); });
        document.getElementById('modeMFCC').addEventListener('click', function() { setDisplayMode('mfcc', this); });
        document.getElementById('modePitch').addEventListener('click', function() { setDisplayMode('pitch', this); });

        function setDisplayMode(mode, btn) {
            displayMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            statusText.textContent = `切换显示模式: ${btn.textContent}`;
            setTimeout(() => {
                if (isPlaying && !isPaused) statusText.textContent = '录音进行中...';
                else if (isPlaying) statusText.textContent = '录音已暂停';
                else statusText.textContent = '等待操作指令';
            }, 1500);
        }

        // ==================== 实时声纹频谱 Canvas ====================
        const barCount = 64;
        let spectrumData = new Array(barCount).fill(0);
        let phase = 0;

        function startSpectrum() {
            if (animationId) cancelAnimationFrame(animationId);
            drawSpectrum();
        }

        function drawSpectrum() {
            const w = canvas.width;
            const h = canvas.height;

            // 清空画布
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, w, h);

            // 生成数据
            if (isPlaying && !isPaused) {
                for (let i = 0; i < barCount; i++) {
                    const noise = Math.random() * 0.3;
                    const freq = i / barCount;
                    let base;
                    if (displayMode === 'wave') {
                        base = Math.sin(phase + i * 0.2) * 0.3 + 0.4;
                        base += Math.sin(phase * 1.5 + i * 0.1) * 0.2;
                    } else if (displayMode === 'spectrum') {
                        base = Math.exp(-freq * 2) * (0.3 + 0.5 * Math.sin(phase + i * 0.5));
                        base += Math.random() * 0.15;
                    } else if (displayMode === 'mfcc') {
                        base = Math.sin(phase + i * 0.8) * 0.2 + 0.25;
                        base += Math.random() * 0.1;
                    } else {
                        base = Math.sin(phase * 0.5 + i * 0.05) * 0.15 + 0.2;
                        base += Math.random() * 0.05;
                    }
                    spectrumData[i] = Math.max(0.05, Math.min(0.9, base + noise));
                }
                phase += 0.08 * speed;
            }

            // 绘制柱状图
            const barW = (w - 8) / barCount;
            const gap = 1;

            for (let i = 0; i < barCount; i++) {
                const barHeight = spectrumData[i] * (h - 20);
                const x = 4 + i * barW;
                const y = h - barHeight - 4;

                // 渐变颜色
                const gradient = ctx.createLinearGradient(x, h - 4, x, y);
                if (displayMode === 'wave') {
                    gradient.addColorStop(0, 'rgba(0, 245, 255, 0.6)');
                    gradient.addColorStop(1, 'rgba(0, 245, 255, 0.9)');
                } else if (displayMode === 'spectrum') {
                    gradient.addColorStop(0, 'rgba(181, 55, 242, 0.6)');
                    gradient.addColorStop(0.5, 'rgba(0, 245, 255, 0.7)');
                    gradient.addColorStop(1, 'rgba(0, 255, 136, 0.9)');
                } else if (displayMode === 'mfcc') {
                    gradient.addColorStop(0, 'rgba(255, 0, 110, 0.5)');
                    gradient.addColorStop(1, 'rgba(255, 0, 110, 0.8)');
                } else {
                    gradient.addColorStop(0, 'rgba(255, 140, 0, 0.5)');
                    gradient.addColorStop(1, 'rgba(255, 140, 0, 0.8)');
                }

                ctx.fillStyle = gradient;
                ctx.fillRect(x, y, barW - gap, barHeight);

                // 顶部高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fillRect(x, y, barW - gap, 2);
            }

            // 扫描线效果
            const scanX = ((phase * 100) % (w + 40)) - 20;
            const scanGradient = ctx.createLinearGradient(scanX, 0, scanX + 20, 0);
            scanGradient.addColorStop(0, 'transparent');
            scanGradient.addColorStop(0.5, 'rgba(0, 245, 255, 0.15)');
            scanGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = scanGradient;
            ctx.fillRect(scanX, 0, 20, h);

            animationId = requestAnimationFrame(drawSpectrum);
        }

        // 初始化画布
        drawSpectrum();

        // ==================== 其他按钮交互 ====================
        document.getElementById('prevBtn').addEventListener('click', () => {
            statusText.textContent = '上一段音频';
            resetStatus();
        });
        document.getElementById('nextBtn').addEventListener('click', () => {
            statusText.textContent = '下一段音频';
            resetStatus();
        });
        document.getElementById('volumeBtn').addEventListener('click', () => {
            statusText.textContent = '音量切换';
            resetStatus();
        });
        document.getElementById('micBtn').addEventListener('click', () => {
            statusText.textContent = '麦克风切换';
            resetStatus();
        });

        // 功能按钮
        ['newLayerBtn', 'copyLayerBtn', 'editLayerBtn', 'rotateLayerBtn',
         'layerAddBtn', 'layerSubBtn', 'layerMulBtn', 'layerDivBtn'].forEach(id => {
            document.getElementById(id).addEventListener('click', function() {
                const label = this.querySelector('span').textContent;
                statusText.textContent = `执行: ${label}`;
                this.classList.toggle('active');
                setTimeout(() => this.classList.remove('active'), 500);
            });
        });

        function resetStatus() {
            setTimeout(() => {
                if (isPlaying && !isPaused) statusText.textContent = '录音进行中...';
                else if (isPlaying) statusText.textContent = '录音已暂停';
                else statusText.textContent = '等待操作指令';
            }, 1500);
        }

        // ==================== 识别说话人 ====================
        document.getElementById('identifyBtn').addEventListener('click', () => {
            if (!isPlaying) {
                statusText.textContent = '请先开始录音';
                statusText.style.color = 'var(--neon-pink)';
                setTimeout(() => {
                    statusText.style.color = '';
                    statusText.textContent = '等待操作指令';
                }, 2000);
                return;
            }

            sidStatus.textContent = '识别中';
            sidStatus.style.color = 'var(--neon-orange)';
            sidStatus.style.borderColor = 'rgba(255,140,0,0.3)';
            sidStatus.style.background = 'rgba(255,140,0,0.1)';

            // 模拟 SAD
            setTimeout(() => {
                document.getElementById('sadValue').textContent = '语音活动检测: 通过';
                document.getElementById('sadValue').className = 'sid-item-value confidence-high';
                document.getElementById('sadProgress').style.width = '85%';
            }, 500);

            // 模拟 LID
            setTimeout(() => {
                document.getElementById('lidValue').textContent = '中文/普通话';
                document.getElementById('lidValue').className = 'sid-item-value confidence-high';
                document.getElementById('lidProgress').style.width = '96%';
            }, 1200);

            // 模拟 SID 结果
            setTimeout(() => {
                const speakers = [
                    { name: '用户 A', confidence: 98.7 },
                    { name: '用户 B', confidence: 93.2 },
                    { name: '用户 C', confidence: 89.5 }
                ];
                const result = speakers[Math.floor(Math.random() * speakers.length)];

                document.getElementById('sidResult').textContent = result.name;
                document.getElementById('sidResult').className = result.confidence > 90
                    ? 'sid-item-value confidence-high'
                    : 'sid-item-value confidence-low';

                document.getElementById('sidConfidence').textContent = result.confidence + '%';
                document.getElementById('sidConfidence').className = result.confidence > 90
                    ? 'sid-item-value confidence-high'
                    : 'sid-item-value confidence-low';
                document.getElementById('sidProgressBar').style.width = result.confidence + '%';

                sidStatus.textContent = '完成';
                sidStatus.style.color = 'var(--neon-green)';
                sidStatus.style.borderColor = 'rgba(0,255,136,0.3)';
                sidStatus.style.background = 'rgba(0,255,136,0.1)';

                statusText.textContent = `识别完成: ${result.name} (${result.confidence}%)`;
                statusText.style.color = 'var(--neon-green)';
            }, 2500);
        });

        // ==================== 浮动粒子 ====================
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 10 + 's';
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 10000);
        }
        setInterval(createParticle, 2000);
    </script>
</body>
