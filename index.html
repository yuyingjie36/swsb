<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>声纹识别 - VOICEPRINT ID</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-cyan: #00f5ff;
            --neon-pink: #ff006e;
            --neon-purple: #b537f2;
            --dark-bg: #0a0a0f;
            --grid-color: rgba(0, 245, 255, 0.05);
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark-bg);
            color: #ffffff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 网格背景 */
        .cyber-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 0;
            opacity: 0.6;
        }

        /* 扫描线效果 */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(0, 245, 255, 0.02) 50%
            );
            background-size: 100% 4px;
            z-index: 999;
            pointer-events: none;
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            max-width: 430px;
            margin: 0 auto;
            padding: 0 24px;
            min-height: 100vh;
        }

        /* Hero 区域 */
        .hero {
            padding-top: 60px;
            text-align: center;
            position: relative;
        }

        .brand {
            font-size: 14px;
            letter-spacing: 8px;
            color: var(--neon-cyan);
            font-weight: 600;
            margin-bottom: 20px;
            text-shadow: 0 0 10px var(--neon-cyan);
            animation: flicker 3s infinite;
        }

        .hero-title {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 1.1;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #ffffff 0%, var(--neon-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
            max-width: 280px;
            margin: 0 auto 40px;
        }

        /* 声波可视化区域 */
        .voiceprint-visualizer {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 40px;
        }

        .pulse-rings {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
        }

        .ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid var(--neon-cyan);
            border-radius: 50%;
            opacity: 0;
            animation: pulse-ring 3s infinite;
        }

        .ring:nth-child(1) { width: 80px; height: 80px; animation-delay: 0s; }
        .ring:nth-child(2) { width: 120px; height: 120px; animation-delay: 0.5s; }
        .ring:nth-child(3) { width: 160px; height: 160px; animation-delay: 1s; }
        .ring:nth-child(4) { width: 200px; height: 200px; animation-delay: 1.5s; }
        .ring:nth-child(5) { width: 240px; height: 240px; animation-delay: 2s; }

        /* 中心按钮 */
        .record-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                0 0 40px rgba(0, 245, 255, 0.4),
                inset 0 0 30px rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .record-button:hover {
            transform: translate(-50%, -50%) scale(1.05);
            box-shadow:
                0 0 60px rgba(0, 245, 255, 0.6),
                inset 0 0 40px rgba(255, 255, 255, 0.2);
        }

        .record-button:active {
            transform: translate(-50%, -50%) scale(0.98);
        }

        .record-button svg {
            width: 48px;
            height: 48px;
            fill: white;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5));
        }

        .record-button.recording {
            animation: recording-pulse 1s infinite;
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
        }

        .record-button.recording svg {
            animation: mic-glow 0.5s infinite alternate;
        }

        /* 声波条 */
        .waveform-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 5;
        }

        .waveform-container.active {
            opacity: 1;
        }

        .wave-bar {
            width: 4px;
            background: linear-gradient(to top, var(--neon-cyan), var(--neon-pink));
            border-radius: 2px;
            height: 20px;
            animation: wave 0.5s ease-in-out infinite alternate;
        }

        .wave-bar:nth-child(1) { animation-delay: 0s; }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; }
        .wave-bar:nth-child(6) { animation-delay: 0.5s; }
        .wave-bar:nth-child(7) { animation-delay: 0.4s; }
        .wave-bar:nth-child(8) { animation-delay: 0.3s; }
        .wave-bar:nth-child(9) { animation-delay: 0.2s; }
        .wave-bar:nth-child(10) { animation-delay: 0.1s; }

        /* 状态提示 */
        .status-text {
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 60px;
            min-height: 20px;
        }

        .status-text.active {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        /* 特性区域 */
        .features {
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-bottom: 50px;
        }

        .feature-item {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 2px solid var(--neon-cyan);
            position: relative;
            overflow: hidden;
        }

        .feature-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(0, 245, 255, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .feature-item:hover::before {
            opacity: 1;
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(0, 245, 255, 0.2), rgba(181, 55, 242, 0.2));
            border-radius: 8px;
            flex-shrink: 0;
        }

        .feature-icon svg {
            width: 20px;
            height: 20px;
            fill: var(--neon-cyan);
        }

        .feature-content h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #ffffff;
        }

        .feature-content p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.5;
        }

        /* 流程展示 */
        .process {
            margin-bottom: 50px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
            margin: 12px auto 0;
        }

        .process-steps {
            display: flex;
            justify-content: space-between;
            position: relative;
        }

        .process-steps::before {
            content: '';
            position: absolute;
            top: 25px;
            left: 40px;
            right: 40px;
            height: 1px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .step-number {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--dark-bg);
            border: 2px solid var(--neon-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: var(--neon-cyan);
            position: relative;
            z-index: 1;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
        }

        .step-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
        }

        /* CTA 按钮 */
        .cta-container {
            padding-bottom: 60px;
            text-align: center;
        }

        .cta-button {
            width: 100%;
            padding: 18px 40px;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            border: none;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.3);
            transition: all 0.3s ease;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 50px rgba(0, 245, 255, 0.5);
        }

        .cta-button:active {
            transform: translateY(0);
        }

        /* 动画 */
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
            52% { opacity: 1; }
            54% { opacity: 0.9; }
        }

        @keyframes pulse-ring {
            0% {
                opacity: 0.6;
                transform: translate(-50%, -50%) scale(0.8);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.2);
            }
        }

        @keyframes wave {
            0% { height: 20px; }
            100% { height: 60px; }
        }

        @keyframes recording-pulse {
            0%, 100% {
                box-shadow: 0 0 40px rgba(255, 0, 110, 0.4);
            }
            50% {
                box-shadow: 0 0 80px rgba(255, 0, 110, 0.6);
            }
        }

        @keyframes mic-glow {
            0% { filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5)); }
            100% { filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.8)); }
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        /* 浮动粒子 */
        .particle {
            position: fixed;
            width: 2px;
            height: 2px;
            background: var(--neon-cyan);
            border-radius: 50%;
            pointer-events: none;
            animation: float-up 10s infinite linear;
            opacity: 0.5;
        }

        @keyframes float-up {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        /* 移动端适配 */
        @media (max-width: 375px) {
            .hero-title {
                font-size: 36px;
            }

            .voiceprint-visualizer {
                width: 240px;
                height: 240px;
            }

            .record-button {
                width: 100px;
                height: 100px;
            }

            .ring:nth-child(1) { width: 60px; height: 60px; }
            .ring:nth-child(2) { width: 90px; height: 90px; }
            .ring:nth-child(3) { width: 120px; height: 120px; }
            .ring:nth-child(4) { width: 150px; height: 150px; }
            .ring:nth-child(5) { width: 180px; height: 180px; }
        }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="scanline"></div>

    <!-- 浮动粒子 -->
    <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
    <div class="particle" style="left: 30%; animation-delay: 2s;"></div>
    <div class="particle" style="left: 50%; animation-delay: 4s;"></div>
    <div class="particle" style="left: 70%; animation-delay: 6s;"></div>
    <div class="particle" style="left: 90%; animation-delay: 8s;"></div>

    <div class="container">
        <!-- Hero -->
        <section class="hero">
            <div class="brand">VOICEPRINT ID</div>
            <h1 class="hero-title">声纹识别</h1>
            <p class="hero-subtitle">基于生物特征的终极身份认证</p>

            <!-- 声波可视化 -->
            <div class="voiceprint-visualizer">
                <div class="pulse-rings">
                    <div class="ring"></div>
                    <div class="ring"></div>
                    <div class="ring"></div>
                    <div class="ring"></div>
                    <div class="ring"></div>
                </div>

                <div class="waveform-container" id="waveform">
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                </div>

                <button class="record-button" id="recordBtn">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
            </div>

            <p class="status-text" id="statusText">点击麦克风开始识别</p>
        </section>

        <!-- Features -->
        <section class="features">
            <div class="feature-item">
                <div class="feature-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
                    </svg>
                </div>
                <div class="feature-content">
                    <h3>军工级加密</h3>
                    <p>采用256位AES加密算法，声纹数据全程加密传输与存储</p>
                </div>
            </div>

            <div class="feature-item">
                <div class="feature-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M13 2.05v2.02c3.95.49 7 3.85 7 7.93 0 3.21-1.92 6-4.72 7.28L13 17v5h5l-1.22-1.22C19.91 19.07 22 15.76 22 12c0-5.18-3.95-9.45-9-9.95zM11 2.05C5.94 2.55 2 6.81 2 12c0 3.76 2.09 7.07 5.22 8.78L6 22h5v-5l-2.28 2.28C6.92 18 5 15.21 5 12c0-4.08 3.05-7.44 7-7.93V2.05z"/>
                    </svg>
                </div>
                <div class="feature-content">
                    <h3>实时验证</h3>
                    <p>毫秒级响应，声纹特征即时比对，无需等待</p>
                </div>
            </div>

            <div class="feature-item">
                <div class="feature-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                </div>
                <div class="feature-content">
                    <h3>99.7%准确率</h3>
                    <p>深度神经网络算法，误识率低于0.01%，安全可靠</p>
                </div>
            </div>
        </section>

        <!-- Process -->
        <section class="process">
            <h2 class="section-title">识别流程</h2>
            <div class="process-steps">
                <div class="step">
                    <div class="step-number">1</div>
                    <span class="step-label">语音录入</span>
                </div>
                <div class="step">
                    <div class="step-number">2</div>
                    <span class="step-label">特征提取</span>
                </div>
                <div class="step">
                    <div class="step-number">3</div>
                    <span class="step-label">身份验证</span>
                </div>
            </div>
        </section>

        <!-- CTA -->
        <div class="cta-container">
            <button class="cta-button" id="ctaBtn">
                开始身份验证
            </button>
        </div>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const waveform = document.getElementById('waveform');
        const statusText = document.getElementById('statusText');
        const ctaBtn = document.getElementById('ctaBtn');

        let isRecording = false;

        // 录音按钮交互
        recordBtn.addEventListener('click', () => {
            isRecording = !isRecording;

            if (isRecording) {
                recordBtn.classList.add('recording');
                waveform.classList.add('active');
                statusText.classList.add('active');
                statusText.textContent = '正在识别中...';

                // 模拟识别过程
                setTimeout(() => {
                    statusText.textContent = '声纹特征提取中...';
                }, 1500);

                setTimeout(() => {
                    statusText.textContent = '身份验证成功';
                    statusText.style.color = '#00ff88';
                }, 3000);
            } else {
                recordBtn.classList.remove('recording');
                waveform.classList.remove('active');
                statusText.classList.remove('active');
                statusText.style.color = '';
                statusText.textContent = '点击麦克风开始识别';
            }
        });

        // CTA按钮交互
        ctaBtn.addEventListener('click', () => {
            // 滚动到顶部
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // 自动触发录音
            setTimeout(() => {
                if (!isRecording) {
                    recordBtn.click();
                }
            }, 500);
        });

        // 声波条高度随机化
        const waveBars = document.querySelectorAll('.wave-bar');
        setInterval(() => {
            waveBars.forEach(bar => {
                const randomHeight = Math.random() * 40 + 20;
                bar.style.height = randomHeight + 'px';
            });
        }, 100);

        // 创建更多粒子
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 10 + 's';
            document.body.appendChild(particle);

            setTimeout(() => {
                particle.remove();
            }, 10000);
        }

        setInterval(createParticle, 2000);
    </script>
</body>
</html>
